pre-commit:
  commands:
    check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: >-
        pnpm exec biome lint --write --unsafe --only=useSortedClasses --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files} &&
        pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
